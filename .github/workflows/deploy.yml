name: Deploy Docs (GitHub Pages)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Setup Node (match your logs: Node 20 is fine)
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install dependencies
      - run: npm ci

      # Build the docs site
      - run: npm run build

      # Deploy to gh-pages branch via Docusaurus
      # IMPORTANT: Docusaurus expects GIT_PASS (not just GITHUB_TOKEN)
      - run: npm run deploy
        env:
          GIT_USER: agentbarry
          GIT_PASS: ${{ secrets.GITHUB_TOKEN }}